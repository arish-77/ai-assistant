<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Personal Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1 class="main-heading">AI Personal Assistant</h1>

    <div class="container">
        <h2>Choose Mode</h2>
    
        <div class="mode-bar">
            <button type="button" class="mode-btn active" data-mode="chat">💬 Chat</button>
            <button type="button" class="mode-btn" data-mode="summarize">📧 Summarize</button>
            <button type="button" class="mode-btn" data-mode="code">🧠 Code</button>
            <button type="button" class="mode-btn" data-mode="rewrite">✍️ Rewrite</button>
        </div>
    
        <h2>Ask Anything</h2>
        <form id="askForm">
            <input type="text" name="question" placeholder="Ask anything..." required>
            <button type="submit">Ask</button>
        </form>

        <!-- 🔥 ADD THESE -->
        <p id="ans-loading" style="display:none;">Processing...</p>
        <p id="answer"></p>

<script>
document.addEventListener("DOMContentLoaded", () => {

    let selectedMode = "chat";

    // Mode buttons
    document.querySelectorAll(".mode-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            selectedMode = btn.getAttribute("data-mode");
        });
    });

    // Ask form
    document.getElementById("askForm").onsubmit = async (e) => {
        e.preventDefault();
        let formData = new FormData(e.target);

        formData.append("mode", selectedMode);

        let loading = document.getElementById("ans-loading");
        loading.style.display = "block";

        let res = await fetch("/ask", {
            method: "POST",
            body: formData
        });

        let data = await res.json();
        document.getElementById("answer").innerText = data.response;

        loading.style.display = "none";
    };

    // Email form
    document.getElementById("emailForm").onsubmit = async (e) => {
        e.preventDefault();
        let formData = new FormData(e.target);

        let loading = document.getElementById("summary-loading");
        loading.style.display = "block";

        let res = await fetch("/summarize", {
            method: "POST",
            body: formData
        });

        let data = await res.json();
        document.getElementById("summary").innerText = data.response;

        loading.style.display = "none";
    };

});
</script>

</body>
</html>
